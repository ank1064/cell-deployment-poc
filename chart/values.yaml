# Default values for cell-poc.
# Overridden per-cell via Harness pipeline variable <+pipeline.variables.cell_name>

cell: default
image:
  repository: nginx
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent
replicaCount: 1
resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 50m
    memory: 64Mi
