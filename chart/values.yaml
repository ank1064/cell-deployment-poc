# Default values for cell-poc.
# Cell identity is derived from .Release.Name (set per-stage by Harness).
# These values intentionally do NOT include `cell` — it must come from the release name.

image:
  repository: nginx
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent
replicaCount: 1
resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 50m
    memory: 64Mi
